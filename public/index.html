<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BDR Accueil</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #141b34;
      --text: #e8edff;
      --muted: #b8c1e8;
      --participant: #5f8cff;
      --admin: #00a57a;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at top, #1b2550 0%, var(--bg) 55%);
      color: var(--text);
      padding: 20px;
    }

    .card {
      width: min(560px, 100%);
      background: var(--card);
      border: 1px solid #27305a;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, .35);
    }

    h1 { margin: 0 0 10px; font-size: 1.8rem; }
    p { margin: 0 0 22px; color: var(--muted); }

    .actions { display: grid; gap: 12px; }

    .btn {
      display: block;
      text-decoration: none;
      color: white;
      font-weight: 600;
      text-align: center;
      padding: 12px 14px;
      border-radius: 10px;
      transition: transform .1s ease, opacity .2s ease;
    }

    .btn:hover { transform: translateY(-1px); opacity: .95; }
    .btn.participant { background: var(--participant); }
    .btn.admin { background: var(--admin); }
  </style>
</head>
<body>
  <main class="card">
    <h1>BDR Collecteur</h1>
    <p>Choisissez votre entrée (non sécurisée) :</p>

    <div class="actions">
      <a class="btn participant" href="/participant.html">Entrée participant</a>
      <a class="btn admin" href="/admin.html">Entrée admin</a>
    </div>
  </main>
</body>
</html>
